openapi: 3.0.3
info:
  title: SCF Product & Program API
  description: |
    REST API for Supply Chain Finance (SCF) Product and Program entities.
    Use this API for product and program related operations
    when backing the SCF module with a Java Spring Boot service.
  version: 1.0.0
  contact:
    name: SCF Module

servers:
  - url: http://localhost:9080/scf
    description: Development environment (localhost)

tags:
  - name: Product Definitions
    description: SCF product definitions (replaces Supabase rest/v1/scf_product_definitions)
  - name: Program Configurations
    description: SCF program configurations (replaces Supabase rest/v1/scf_program_configurations)
  - name: Counter Parties
    description: Counter party master table
  - name: Anchors
    description: Anchor master table (basic information)

paths:
  # --- Product Definitions (Supabase scf_product_definitions) ---
  /product-definitions:
    get:
      tags: [Product Definitions]
      summary: List or search product definitions
      description: |
        List product definitions with optional filters and ordering.
        By default, the list is ordered by `is_conventional` descending, then by `created_at` descending.By default, effective_date is current local date from entity and is_active is true by default from entity
      operationId: listProductDefinitions
      parameters:
        - name: order
          in: query
          description: Optional comma-separated order clauses; each is `field.asc` or `field.desc`. Overrides default order (is_conventional.desc, created_at.desc).
          schema: { type: string }
        - name: product_code
          in: query
          description: Filter by product code (exact match)
          schema: { type: string }
        - name: is_active
          in: query
          description: Filter by active flag
          schema: { type: boolean }
        - name: is_conventional
          in: query
          description: Filter by conventional financing flag
          schema: { type: boolean }
        - name: status
          in: query
          description: Filter by definition status (e.g. DRAFT, ACTIVE)
          schema: { $ref: '#/components/schemas/ProductDefinitionStatus' }
        - name: page
          in: query
          description: Zero-based page index (0, 1, 2, ...).
          schema: { type: integer, minimum: 0, default: 0 }
        - name: size
          in: query
          description: Number of items per page.
          schema: { type: integer, minimum: 1, maximum: 1000, default: 20 }
      responses:
        '200':
          description: Paginated list of product definitions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageOfProductDefinitions' }
    post:
      tags: [Product Definitions]
      summary: Create product definition
      operationId: createProductDefinition
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScfProductDefinitionCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfProductDefinitionResponse' }
        '400':
          description: Validation error

  /product-definitions/{id}:
    get:
      tags: [Product Definitions]
      summary: Get product definition by id
      operationId: getProductDefinition
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Product definition
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfProductDefinitionResponse' }
        '404':
          description: Not found
    put:
      tags: [Product Definitions]
      summary: Update product definition
      operationId: updateProductDefinition
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScfProductDefinitionUpdate' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfProductDefinitionResponse' }
        '404':
          description: Not found
    patch:
      tags: [Product Definitions]
      summary: Partially update product definition (e.g. is_active)
      operationId: patchProductDefinition
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScfProductDefinitionPatch' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfProductDefinitionResponse' }
        '404':
          description: Not found
    delete:
      tags: [Product Definitions]
      summary: Delete product definition
      operationId: deleteProductDefinition
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

  # --- Program Configurations (Supabase scf_program_configurations) ---
  /program-configurations:
    get:
      tags: [Program Configurations]
      summary: List or search program configurations
      description: |
        List program configurations with optional filters and ordering.
        By default, the list is ordered by `created_at` descending.
        Supports query patterns like rest/v1/scf_program_configurations?order=created_at.desc
      operationId: listProgramConfigurations
      parameters:
        - name: order
          in: query
          description: "Optional comma-separated order clauses; each is field.asc or field.desc. Overrides default order (created_at.desc). Example: order=created_at.desc"
          schema: { type: string }
        - name: program_id
          in: query
          description: Filter by program id (exact match)
          schema: { type: string }
        - name: product_code
          in: query
          description: Filter by product code (exact match)
          schema: { type: string }
        - name: status
          in: query
          description: Filter by program status (e.g. DRAFT, ACTIVE, SUSPENDED, CLOSED)
          schema: { $ref: '#/components/schemas/ProgramStatus' }
        - name: anchor_id
          in: query
          description: Filter by anchor (UUID of anchor master linked via program_anchor)
          schema: { type: string, format: uuid }
        - name: search
          in: query
          description: Case-insensitive search on program id and program name.
          schema: { type: string }
        - name: page
          in: query
          description: Zero-based page index (0, 1, 2, ...).
          schema: { type: integer, minimum: 0, default: 0 }
        - name: size
          in: query
          description: Number of items per page.
          schema: { type: integer, minimum: 1, maximum: 1000, default: 20 }
      responses:
        '200':
          description: Paginated list of program configurations
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageOfProgramConfigurations' }
    post:
      tags: [Program Configurations]
      summary: Create program configuration (Step 1 – General)
      description: |
        Creates a program definition in DRAFT status.
        Returns programId for use in subsequent steps (cashflow, fee-catalogue).
      operationId: createProgramConfiguration
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProgramGeneralRequest' }
      responses:
        '201':
          description: Created; ProgramDefinition in DRAFT; returns programId for next steps
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgramCreatedResponse' }
        '400':
          description: Validation error

  /program-configurations/{programId}/cashflow:
    patch:
      tags: [Program Configurations]
      summary: Update cashflow (Step 2 – Disbursement + Repayment)
      description: Updates disbursement and repayment settings for a draft program configuration.
      operationId: patchProgramConfigurationCashflow
      parameters:
        - name: programId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProgramCashflowRequest' }
      responses:
        '200':
          description: Updated cashflow section for the program
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgramCashflowResponse' }
        '400':
          description: Validation error
        '404':
          description: Program not found
        '409':
          description: Program not in DRAFT (cannot edit cashflow)

  /program-configurations/{programId}/general:
    patch:
      tags: [Program Configurations]
      summary: Update general information (Step 1 – Draft update)
      description: |
        Updates Step 1 general information for an existing draft program configuration.
        Use POST /program-configurations when no draft exists yet; use this endpoint when programId already exists.
      operationId: patchProgramConfigurationGeneral
      parameters:
        - name: programId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProgramGeneralRequest' }
      responses:
        '200':
          description: Updated general information section for the program
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfProgramConfigurationResponse' }
        '400':
          description: Validation error
        '404':
          description: Program not found
        '409':
          description: Program not in DRAFT (cannot edit general information)

  /program-configurations/{programId}/fee-catalogue:
    patch:
      tags: [Program Configurations]
      summary: Update fee catalogue (Step 3)
      description: Updates fee catalogue and related fee/insurance settings for a draft program configuration.
      operationId: patchProgramConfigurationFeeCatalogue
      parameters:
        - name: programId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProgramFeeCatalogueRequest' }
      responses:
        '200':
          description: Updated fee catalogue section for the program
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgramFeeCatalogueResponse' }
        '400':
          description: Validation error
        '404':
          description: Program not found
        '409':
          description: Program not in DRAFT (cannot edit fee catalogue)

  /program-configurations/{programId}/submit:
    post:
      tags: [Program Configurations]
      summary: Submit program (Final step)
      description: |
        Submits a draft program after completing all required wizard steps.
        Changes program status from DRAFT to SUBMITTED.
      operationId: submitProgramConfiguration
      parameters:
        - name: programId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Program submitted successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgramSubmittedResponse' }
        '400':
          description: Validation error or missing required steps
        '404':
          description: Program not found
        '409':
          description: Program cannot be submitted in current state

  /program-configurations/{programId}/copy:
    post:
      tags: [Program Configurations]
      summary: Copy existing program configuration
      description: |
        Creates a new draft program configuration by copying an existing program.
        Returns the new programId (copied resource id).
      operationId: copyProgramConfiguration
      parameters:
        - name: programId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '201':
          description: Program copied successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgramCopiedResponse' }
        '400':
          description: Validation error
        '404':
          description: Program not found
        '409':
          description: Program cannot be copied in current state

  /program-configurations/{id}:
    get:
      tags: [Program Configurations]
      summary: Get program configuration by id
      operationId: getProgramConfiguration
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Program configuration
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfProgramConfigurationResponse' }
        '404':
          description: Not found
    put:
      tags: [Program Configurations]
      summary: Update program configuration
      operationId: updateProgramConfiguration
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScfProgramConfigurationUpdate' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfProgramConfigurationResponse' }
        '404':
          description: Not found
    delete:
      tags: [Program Configurations]
      summary: Delete program configuration
      operationId: deleteProgramConfiguration
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

  # --- Counter Parties (master - basic info) ---
  /counter-parties:
    get:
      tags: [Counter Parties]
      summary: List counter parties
      operationId: listCounterParties
      parameters:
        - name: counter_party_id
          in: query
          description: Filter by system counter party id (exact match)
          schema: { type: string }
        - name: legal_name
          in: query
          description: Filter by legal name (exact or partial match)
          schema: { type: string }
        - name: trade_name
          in: query
          description: Filter by trade name (exact or partial match)
          schema: { type: string }
        - name: counter_party_type
          in: query
          description: Filter by counter party type (Supplier / Buyer / Dealer / Distributor)
          schema: { type: string }
        - name: status
          in: query
          description: Filter by operational status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE]
        - name: approval_status
          in: query
          description: Filter by governance status
          schema: { $ref: '#/components/schemas/CounterPartyApprovalStatus' }
        - name: page
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: size
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 20 }
      responses:
        '200':
          description: Paginated list of counter parties
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageOfCounterParties' }
    post:
      tags: [Counter Parties]
      summary: Create counter party
      operationId: createCounterParty
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScfCounterPartyCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfCounterPartyResponse' }
        '400':
          description: Validation error
  /counter-parties/{id}:
    get:
      tags: [Counter Parties]
      summary: Get counter party by id
      operationId: getCounterParty
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Counter party
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfCounterPartyResponse' }
        '404':
          description: Not found
    put:
      tags: [Counter Parties]
      summary: Update counter party
      operationId: updateCounterParty
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScfCounterPartyUpdate' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfCounterPartyResponse' }
        '404':
          description: Not found
    delete:
      tags: [Counter Parties]
      summary: Delete counter party
      operationId: deleteCounterParty
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
        '409':
          description: Conflict (in use by a program)

  # --- Anchors (master - basic info) ---
  /anchors:
    get:
      tags: [Anchors]
      summary: List anchors (master)
      operationId: listAnchors
      parameters:
        - name: anchor_id
          in: query
          description: Filter by business anchor id (exact match)
          schema: { type: string }
        - name: anchor_name
          in: query
          description: Filter by anchor name (exact or partial match)
          schema: { type: string }
        - name: page
          in: query
          description: Zero-based page index (0, 1, 2, ...).
          schema: { type: integer, minimum: 0, default: 0 }
        - name: size
          in: query
          description: Number of items per page.
          schema: { type: integer, minimum: 1, maximum: 1000, default: 20 }
      responses:
        '200':
          description: Paginated list of anchors
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageOfAnchors' }
    post:
      tags: [Anchors]
      summary: Create anchor
      operationId: createAnchor
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScfAnchorCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfAnchorResponse' }
        '400':
          description: Validation error

  /anchors/{id}:
    get:
      tags: [Anchors]
      summary: Get anchor by id
      operationId: getAnchor
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Anchor
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfAnchorResponse' }
        '404':
          description: Not found
    put:
      tags: [Anchors]
      summary: Update anchor
      operationId: updateAnchor
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScfAnchorUpdate' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScfAnchorResponse' }
        '404':
          description: Not found
    delete:
      tags: [Anchors]
      summary: Delete anchor
      operationId: deleteAnchor
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
        '409':
          description: Conflict (e.g. anchor in use by a program)

components:
  schemas:
    ProgramStatus:
      type: string
      enum: [DRAFT, SUBMITTED, ACTIVE, SUSPENDED, CLOSED]
      description: Program lifecycle status (SUBMITTED after submit, then ACTIVE when fully activated)
    ProductType:
      type: string
      enum: [INVOICE_DISCOUNTING, REVERSE_FACTORING, DYNAMIC_DISCOUNTING, PURCHASE_ORDER_FINANCE]
      description: SCF product type
    ProductDefinitionStatus:
      type: string
      enum: [DRAFT, ACTIVE, SUSPENDED, CLOSED]
      description: Product definition lifecycle status
    AnchorRole:
      type: string
      enum: [SELLER_SUPPLIER, BUYER, MANUFACTURER, DISTRIBUTOR]
      description: Anchor role - Seller/Supplier, Buyer, Manufacturer, or Distributor
    CounterPartyRole:
      type: string
      enum: [BUYER, SUPPLIER, VENDOR, DEALER]
      description: Counter party role - Buyer, Supplier, Vendor, or Dealer
    BorrowerRole:
      type: string
      enum: [SELLER_SUPPLIER, BUYER, MANUFACTURER, DISTRIBUTOR, BOTH]
      description: Borrower role - Seller/Supplier, Buyer, Manufacturer, Distributor, or Both
    CounterPartyApprovalStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]
      description: Governance status for counter party records
    CounterPartyPendingAction:
      type: string
      enum: [NEW, MODIFIED, DELETED]
      description: Pending governance action while approval_status is PENDING

    # --- Pagination (Spring Page/Pageable style) ---
    Page:
      type: object
      description: Spring-style paginated response
      required: [ content, totalElements, totalPages, size, number, first, last ]
      properties:
        content:
          type: array
          description: Array of items in this page
          items: {}
        totalElements:
          type: integer
          minimum: 0
          description: Total number of elements across all pages
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages
        size:
          type: integer
          minimum: 1
          description: Number of items per page
        number:
          type: integer
          minimum: 0
          description: Zero-based page index (current page number)
        first:
          type: boolean
          description: Whether this is the first page
        last:
          type: boolean
          description: Whether this is the last page
        numberOfElements:
          type: integer
          minimum: 0
          description: Number of items in this page (may be less than size on last page)
    PageOfProductDefinitions:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/ScfProductDefinitionResponse' }
    PageOfProgramConfigurations:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/ScfProgramConfigurationResponse' }
    PageOfAnchors:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/ScfAnchorResponse' }
    PageOfCounterParties:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/ScfCounterPartyResponse' }

    # --- Product Definition (Supabase scf_product_definitions) ---
    ScfProductDefinitionResponse:
      type: object
      description: Product definition (mirrors scf_product_definitions)
      properties:
        id: { type: string, format: uuid }
        product_code: { type: string, maxLength: 64 }
        product_name: { type: string, maxLength: 256 }
        product_description: { type: string, maxLength: 2000 }
        anchor_role: { $ref: '#/components/schemas/AnchorRole' }
        borrower_role: { $ref: '#/components/schemas/BorrowerRole' }
        counter_party_role: { $ref: '#/components/schemas/CounterPartyRole' }
        authorization_required: { type: boolean }
        underlying_instrument: { $ref: '#/components/schemas/ProductType' }
        product_centric: { type: string, maxLength: 64 }
        effective_date: { type: string, format: date }
        expiry_date: { type: string, format: date }
        is_active: { type: boolean }
        status: { $ref: '#/components/schemas/ProductDefinitionStatus' }
        is_conventional:
          type: boolean
          description: Whether the product follows conventional financing. Defaults to false when not provided on create.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ScfProductDefinitionCreate:
      type: object
      required: [product_code, product_name]
      properties:
        product_code: { type: string, maxLength: 64 }
        product_name: { type: string, maxLength: 256 }
        product_description: { type: string }
        anchor_role: { $ref: '#/components/schemas/AnchorRole' }
        borrower_role: { $ref: '#/components/schemas/BorrowerRole' }
        counter_party_role: { $ref: '#/components/schemas/CounterPartyRole' }
        authorization_required: { type: boolean }
        underlying_instrument: { $ref: '#/components/schemas/ProductType' }
        product_centric: { type: string }
        effective_date: { type: string, format: date }
        expiry_date: { type: string, format: date }
        is_active: { type: boolean, default: true }
        is_conventional:
          type: boolean
          default: false
          description: Whether the product follows conventional financing. Defaults to false when not provided.
    ScfProductDefinitionUpdate:
      type: object
      properties:
        product_name: { type: string }
        product_description: { type: string }
        anchor_role: { $ref: '#/components/schemas/AnchorRole' }
        borrower_role: { $ref: '#/components/schemas/BorrowerRole' }
        counter_party_role: { $ref: '#/components/schemas/CounterPartyRole' }
        authorization_required: { type: boolean }
        underlying_instrument: { $ref: '#/components/schemas/ProductType' }
        product_centric: { type: string }
        effective_date: { type: string, format: date }
        expiry_date: { type: string, format: date }
        is_active: { type: boolean }
        is_conventional: { type: boolean }
    ScfProductDefinitionPatch:
      type: object
      description: Partial update for product definition (e.g. toggle is_active)
      properties:
        is_active: { type: boolean }

    # --- Program Configuration (scf_program_configurations) ---
    ScfProgramConfigurationResponse:
      type: object
      description: Program configuration; cashflow and fee catalogue are in separate tables (nested when loaded)
      properties:
        id: { type: string, format: uuid }
        program_id: { type: string }
        program_name: { type: string }
        program_description: { type: string }
        program_currency: { type: string }
        status: { type: string }
        product_code: { type: string }
        product_name: { type: string }
        program_limit: { type: number, format: double }
        available_limit: { type: number, format: double }
        debit_account_number: { type: string }
        effective_date: { type: string, format: date }
        expiry_date: { type: string, format: date }
        program_anchor:
