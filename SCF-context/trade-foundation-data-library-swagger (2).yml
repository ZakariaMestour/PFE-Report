components:
  schemas:
    BankDirectoryCreateRequest:
      type: object
      required: [swiftCode, bankName, countryCode, city, addressLine1]
      properties:
        swiftCode:
          type: string
          pattern: "^[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?$"
          maxLength: 11
        bankName: { type: string, maxLength: 150 }
        countryCode: { type: string, minLength: 2, maxLength: 2 }
        city: { type: string, maxLength: 100 }
        addressLine1: { type: string, maxLength: 150 }
        addressLine2: { type: string, maxLength: 150, nullable: true }
        postalCode: { type: string, maxLength: 35, nullable: true }
        operationalAddressSame: { type: boolean, default: true }
        opAddressLine1: { type: string, maxLength: 150, nullable: true }
        opAddressLine2: { type: string, maxLength: 150, nullable: true }
        opCity: { type: string, maxLength: 100, nullable: true }
        opCountryCode: { type: string, minLength: 2, maxLength: 2, nullable: true }
        opPostalCode: { type: string, maxLength: 35, nullable: true }
        institutionType: { type: string, enum: [FIN, NFIN], default: FIN }
        operationalStatus: { type: string, enum: [ENABLED, DISABLED, SUSPENDED], default: ENABLED }
        branchCode: { type: string, maxLength: 3, nullable: true }
        branchName: { type: string, maxLength: 100, nullable: true }
        branchAddress: { type: string, maxLength: 150, nullable: true }
        bankId: { type: string, maxLength: 20, nullable: true }
        leiNumber: { type: string, maxLength: 20, nullable: true }
        isCorrespondentBank: { type: boolean, default: false }
        parentBankSwift:
          type: string
          pattern: "^[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?$"
          maxLength: 11
          nullable: true
        contactNumber: { type: string, maxLength: 15, nullable: true }
        primaryEmail:
          type: string
          format: email
          maxLength: 254
          nullable: true

    BankDirectoryUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/BankDirectoryCreateRequest"

    BankDirectoryRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        swiftCode: { type: string }
        bankName: { type: string }
        countryCode: { type: string }
        city: { type: string }
        addressLine1: { type: string }
        addressLine2: { type: string, nullable: true }
        postalCode: { type: string, nullable: true }
        operationalAddressSame: { type: boolean }
        opAddressLine1: { type: string, nullable: true }
        opAddressLine2: { type: string, nullable: true }
        opCity: { type: string, nullable: true }
        opCountryCode: { type: string, nullable: true }
        opPostalCode: { type: string, nullable: true }
        institutionType: { type: string, enum: [FIN, NFIN] }
        operationalStatus: { type: string, enum: [ENABLED, DISABLED, SUSPENDED] }
        branchCode: { type: string, nullable: true }
        branchName: { type: string, nullable: true }
        branchAddress: { type: string, nullable: true }
        bankId: { type: string, nullable: true }
        leiNumber: { type: string, nullable: true }
        isCorrespondentBank: { type: boolean }
        parentBankSwift: { type: string, nullable: true }
        contactNumber: { type: string, nullable: true }
        primaryEmail: { type: string, nullable: true }
        status: { type: string, enum: [PENDING, APPROVED, REJECTED] }
        pendingAction: { type: string, enum: [NEW, MODIFY, DELETE], nullable: true }
        lastAction: { type: string, nullable: true }
        rejectionReason: { type: string, nullable: true }
        approvedBy: { type: string, nullable: true }
        approvedAt: { type: string, format: date-time, nullable: true }
        rejectedBy: { type: string, nullable: true }
        rejectedAt: { type: string, format: date-time, nullable: true }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        modifiedBy: { type: string, nullable: true }
        modifiedAt: { type: string, format: date-time, nullable: true }
        isActive: { type: boolean }
        originalData:
          type: object
          nullable: true
          additionalProperties: true

    PageBankDirectoryRecord:
      type: object
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/BankDirectoryRecord" }
        pageable:
          type: object
          additionalProperties: true
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }
        first: { type: boolean }
        last: { type: boolean }
        empty: { type: boolean }

    BulkUploadResult:
      type: object
      properties:
        totalRowsParsed: { type: integer }
        validRecords: { type: integer }
        inserted: { type: integer }
        errors: { type: integer }
        errorDetails:
          type: array
          items: { type: string }

    CurrencyMasterCreateRequest:
      type: object
      required:
        - entityName
        - currencyName
        - alphabeticCode
        - numericCode
        - minorUnit
      properties:
        entityName: { type: string, maxLength: 150 }
        currencyName: { type: string, maxLength: 150 }
        alphabeticCode:
          type: string
          pattern: "^[A-Z]{3}$"
          maxLength: 3
        numericCode:
          type: string
          pattern: "^[0-9]{3}$"
          maxLength: 3
        minorUnit:
          type: integer
          minimum: 0
          maximum: 18
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          nullable: true
        roundingMethod: { type: string, maxLength: 80, nullable: true }
        roundingPrecision:
          type: integer
          minimum: 0
          maximum: 18
          nullable: true
        fxRevalRequired: { type: boolean, default: false }
        fxRevalFrequency: { type: string, maxLength: 40, nullable: true }
        fxRevalMethod: { type: string, maxLength: 80, nullable: true }
        holidayCalendarRef: { type: string, maxLength: 120, nullable: true }
        settlementCutoff: { type: string, maxLength: 20, nullable: true }
        settlementTimezone: { type: string, maxLength: 80, nullable: true }
        settlementIndicator: { type: string, maxLength: 20, nullable: true }
        operationalStatus:
          type: string
          enum: [ENABLED, DISABLED, SUSPENDED]
          default: ENABLED

    CurrencyMasterUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/CurrencyMasterCreateRequest"

    CurrencyMasterRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        entityName: { type: string }
        currencyName: { type: string }
        alphabeticCode: { type: string }
        numericCode: { type: string }
        minorUnit: { type: integer }
        countryCode: { type: string, nullable: true }
        roundingMethod: { type: string, nullable: true }
        roundingPrecision: { type: integer, nullable: true }
        fxRevalRequired: { type: boolean }
        fxRevalFrequency: { type: string, nullable: true }
        fxRevalMethod: { type: string, nullable: true }
        holidayCalendarRef: { type: string, nullable: true }
        settlementCutoff: { type: string, nullable: true }
        settlementTimezone: { type: string, nullable: true }
        settlementIndicator: { type: string, nullable: true }
        operationalStatus: { type: string, enum: [ENABLED, DISABLED, SUSPENDED] }
        status: { type: string, enum: [PENDING, APPROVED, REJECTED] }
        pendingAction:
          type: string
          enum: [NEW, MODIFIED]
          nullable: true
        lastAction:
          type: string
          nullable: true
          description: >
            When set, one of CREATED, UPDATED, APPROVED, BULK_LOADED, SEEDED,
            CREATION_REJECTED, MODIFICATION_REJECTED.
        rejectionReason: { type: string, nullable: true }
        approvedBy: { type: string, nullable: true }
        approvedAt: { type: string, format: date-time, nullable: true }
        rejectedBy: { type: string, nullable: true }
        rejectedAt: { type: string, format: date-time, nullable: true }
        createdBy: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        modifiedBy: { type: string, nullable: true }
        modifiedAt: { type: string, format: date-time, nullable: true }
        userId: { type: string, format: uuid }
        isActive: { type: boolean }
        originalData:
          type: object
          nullable: true
          additionalProperties: true

    PageCurrencyMasterRecord:
      type: object
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/CurrencyMasterRecord" }
        pageable:
          type: object
          additionalProperties: true
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }
        first: { type: boolean }
        last: { type: boolean }
        empty: { type: boolean }

    GeographicMasterAuditFields:
      type: object
      description: Shared maker-checker and audit fields for country, state, and city masters.
      properties:
        approvalStatus: { type: string, enum: [PENDING, APPROVED, REJECTED] }
        pendingAction:
          type: string
          enum: [NEW, MODIFIED]
          nullable: true
        operationalStatus:
          type: string
          enum: [ENABLED, DISABLED]
          description: Operational enable/disable toggle (maps to DB column status).
        lastAction:
          type: string
          nullable: true
          description: >
            When set, one of CREATED, UPDATED, APPROVED, BULK_LOADED, SEEDED,
            CREATION_REJECTED, MODIFICATION_REJECTED.
        rejectionReason: { type: string, nullable: true }
        approvedBy: { type: string, nullable: true }
        approvedAt: { type: string, format: date-time, nullable: true }
        rejectedBy: { type: string, nullable: true }
        rejectedAt: { type: string, format: date-time, nullable: true }
        createdBy: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        modifiedBy: { type: string, nullable: true }
        modifiedAt: { type: string, format: date-time, nullable: true }
        userId: { type: string, format: uuid }
        originalData:
          type: object
          nullable: true
          additionalProperties: true

    CountryMasterCreateRequest:
      type: object
      required: [countryName, countryCodeIso2, countryCodeIso3]
      properties:
        countryName: { type: string, maxLength: 100 }
        countryCodeIso2:
          type: string
          pattern: "^[A-Z]{2}$"
          maxLength: 2
        countryCodeIso3:
          type: string
          pattern: "^[A-Z]{3}$"
          maxLength: 3
        numericCode:
          type: string
          pattern: "^[0-9]{1,3}$"
          maxLength: 3
          nullable: true
        phoneCode: { type: string, maxLength: 10, nullable: true }
        region: { type: string, maxLength: 30, nullable: true }
        subRegion: { type: string, maxLength: 30, nullable: true }
        operationalStatus:
          type: string
          enum: [ENABLED, DISABLED]
          default: ENABLED

    CountryMasterUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/CountryMasterCreateRequest"

    CountryMasterRecord:
      allOf:
        - type: object
          properties:
            id: { type: string, format: uuid }
            countryName: { type: string }
            countryCodeIso2: { type: string }
            countryCodeIso3: { type: string }
            numericCode: { type: string, nullable: true }
            phoneCode: { type: string, nullable: true }
            region: { type: string, nullable: true }
            subRegion: { type: string, nullable: true }
        - $ref: "#/components/schemas/GeographicMasterAuditFields"

    PageCountryMasterRecord:
      type: object
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/CountryMasterRecord" }
        pageable:
          type: object
          additionalProperties: true
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }
        first: { type: boolean }
        last: { type: boolean }
        empty: { type: boolean }

    StateMasterCreateRequest:
      type: object
      required: [stateName, stateCodeIso, countryCodeIso2]
      properties:
        stateName: { type: string, maxLength: 100 }
        stateCodeIso:
          type: string
          pattern: "^[A-Z0-9][A-Z0-9-]{0,9}$"
          maxLength: 10
        countryCodeIso2:
          type: string
          pattern: "^[A-Z]{2}$"
          maxLength: 2
          description: Parent country ISO 3166-1 alpha-2 (logical reference to country_master).
        operationalStatus:
          type: string
          enum: [ENABLED, DISABLED]
          default: ENABLED

    StateMasterUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/StateMasterCreateRequest"

    StateMasterRecord:
      allOf:
        - type: object
          properties:
            id: { type: string, format: uuid }
            stateName: { type: string }
            stateCodeIso: { type: string }
            countryCodeIso2: { type: string }
        - $ref: "#/components/schemas/GeographicMasterAuditFields"

    PageStateMasterRecord:
      type: object
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/StateMasterRecord" }
        pageable:
          type: object
          additionalProperties: true
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }
        first: { type: boolean }
        last: { type: boolean }
        empty: { type: boolean }

    CityMasterCreateRequest:
      type: object
      required: [cityName, cityCode, stateCodeIso, countryCodeIso2]
      properties:
        cityName: { type: string, maxLength: 100 }
        cityCode:
          type: string
          pattern: "^[A-Z0-9][A-Z0-9-]{0,9}$"
          maxLength: 10
        stateCodeIso:
          type: string
          pattern: "^[A-Z0-9][A-Z0-9-]{0,9}$"
          maxLength: 10
          description: Parent state ISO 3166-2 code (logical reference to state_master).
        countryCodeIso2:
          type: string
          pattern: "^[A-Z]{2}$"
          maxLength: 2
          description: Denormalized parent country ISO2 for query convenience.
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          nullable: true
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          nullable: true
        operationalStatus:
          type: string
          enum: [ENABLED, DISABLED]
          default: ENABLED

    CityMasterUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/CityMasterCreateRequest"

    CityMasterRecord:
      allOf:
        - type: object
          properties:
            id: { type: string, format: uuid }
            cityName: { type: string }
            cityCode: { type: string }
            stateCodeIso: { type: string }
            countryCodeIso2: { type: string }
            latitude: { type: number, format: double, nullable: true }
            longitude: { type: number, format: double, nullable: true }
        - $ref: "#/components/schemas/GeographicMasterAuditFields"

    PageCityMasterRecord:
      type: object
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/CityMasterRecord" }
        pageable:
          type: object
          additionalProperties: true
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }
        first: { type: boolean }
        last: { type: boolean }
        empty: { type: boolean }

    RejectRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1

    ProductOption:
      type: object
      properties:
        productCode: { type: string }
        productName: { type: string }

    TransactionReferenceConfigCreateRequest:
      type: object
      required:
        - productCode
        - sequenceResetLogic
        - componentOrder
      properties:
        productCode: { type: string, maxLength: 10 }
        productName: { type: string, maxLength: 100, nullable: true }
        includeProductCode: { type: boolean, default: false }
        productCodeLength: { type: integer, minimum: 1, maximum: 3 }
        includeCurrencyCode: { type: boolean, default: false }
        currencyCodeLength: { type: integer, minimum: 1, maximum: 3 }
        includeBankCode: { type: boolean, default: false }
        bankCodeLength: { type: integer, minimum: 1, maximum: 5 }
        includeBranchCode: { type: boolean, default: false }
        branchCodeLength: { type: integer, minimum: 1, maximum: 5 }
        includeProductType: { type: boolean, default: false }
        productTypeLength: { type: integer, minimum: 1, maximum: 3 }
        includePartyRole: { type: boolean, default: false }
        partyRoleLength: { type: integer, minimum: 1, maximum: 5 }
        includeYear: { type: boolean, default: false }
        yearLength: { type: integer, minimum: 1, maximum: 4 }
        includeCustomChar: { type: boolean, default: false }
        customCharLength: { type: integer, minimum: 1, maximum: 5 }
        customCharValue: { type: string, maxLength: 5, nullable: true }
        sequenceResetLogic:
          type: string
          enum: [NONE, YEARLY, PRODUCT_WISE]
        componentOrder:
          type: array
          items:
            type: string
            enum: [product_code, currency_code, bank_code, branch_code, product_type, party_role, year, custom_char]

    TransactionReferenceConfigUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/TransactionReferenceConfigCreateRequest"

    TransactionReferenceConfigRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        productCode: { type: string }
        productName: { type: string, nullable: true }
        includeProductCode: { type: boolean }
        productCodeLength: { type: integer }
        includeCurrencyCode: { type: boolean }
        currencyCodeLength: { type: integer }
        includeBankCode: { type: boolean }
        bankCodeLength: { type: integer }
        includeBranchCode: { type: boolean }
        branchCodeLength: { type: integer }
        includeProductType: { type: boolean }
        productTypeLength: { type: integer }
        includePartyRole: { type: boolean }
        partyRoleLength: { type: integer }
        includeYear: { type: boolean }
        yearLength: { type: integer }
        includeCustomChar: { type: boolean }
        customCharLength: { type: integer }
        customCharValue: { type: string, nullable: true }
        totalLength: { type: integer, example: 16 }
        numericSequenceLength: { type: integer }
        sequenceResetLogic: { type: string, enum: [NONE, YEARLY, PRODUCT_WISE] }
        componentOrder:
          type: array
          items: { type: string }
        status: { type: string, enum: [PENDING, APPROVED, REJECTED] }
        pendingAction: { type: string, enum: [NEW, MODIFIED, DELETED], nullable: true }
        lastAction: { type: string, nullable: true }
        rejectionReason: { type: string, nullable: true }
        approvedBy: { type: string, nullable: true }
        approvedAt: { type: string, format: date-time, nullable: true }
        rejectedBy: { type: string, nullable: true }
        rejectedAt: { type: string, format: date-time, nullable: true }
        createdBy: { type: string, nullable: true }
        createdAt: { type: string, format: date-time, nullable: true }
        modifiedBy: { type: string, nullable: true }
        modifiedAt: { type: string, format: date-time, nullable: true }
        originalData:
          type: object
          nullable: true
          additionalProperties: true

    PageTransactionReferenceConfig:
      type: object
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/TransactionReferenceConfigRecord" }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }
        first: { type: boolean }
        last: { type: boolean }
        empty: { type: boolean }

    TransactionReferenceRuntimeConfigResponse:
      type: object
      properties:
        productCode: { type: string }
        eventCode: { type: string }
        isInitialEvent: { type: boolean }
        config:
          $ref: "#/components/schemas/TransactionReferenceConfigRecord"

    TransactionReferenceRuntimePreviewRequest:
      type: object
      required: [productCode, eventCode]
      properties:
        productCode: { type: string }
        eventCode: { type: string }
        formData:
          type: object
          additionalProperties: true

    TransactionReferenceRuntimePreviewResponse:
      type: object
      properties:
        prefix: { type: string }
        previewReference: { type: string }
        nextSequencePreview: { type: integer }
        isComplete: { type: boolean }
        numericSequenceLength: { type: integer }

    TransactionReferenceRuntimeFinalizeRequest:
      type: object
      required: [productCode, eventCode]
      properties:
        productCode: { type: string }
        eventCode: { type: string }
        formData:
          type: object
          additionalProperties: true
        idempotencyKey: { type: string, nullable: true }

    TransactionReferenceRuntimeFinalizeResponse:
      type: object
      properties:
        transactionReference: { type: string }
        reservedSequence: { type: integer }
        prefix: { type: string }

    StandardResponse:
      type: object
      properties:
        status: { type: string, example: SUCCESS }
        message: { type: string }
        codeMessage: { type: string, nullable: true }
        timestamp: { type: string, format: date-time, nullable: true }
        data:
          type: object
          nullable: true
          additionalProperties: true
        error: { type: string, nullable: true }

