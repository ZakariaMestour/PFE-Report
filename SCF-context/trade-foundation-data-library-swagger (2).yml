openapi: 3.0.3
info:
  title: Foundation Data Library (FDL) Service API
  version: 0.1.0-s7
  description: |
    New microservice API contract for Foundation Data Library.
    Sprint-6 scope covers Bank/SWIFT Directory with maker-checker governance,
    bulk upload, search/filter, template download, and export.
    Currency Master adds ISO 4217-aligned currency definitions per entity with the same
    governance pattern (create/modify approval; no delete workflow in current model).
    Country, State, and City Master add ISO geographic reference data (3166-1/3166-2)
    with operational enable/disable, maker-checker approval, bulk upload, and export.
servers:
  - url: https://{host}
    description: Environment-specific host
    variables:
      host:
        default: api.example.com
  - url: http://localhost:8090
    description: Local FDL service
tags:
  - name: FDL Bank Directory
  - name: FDL Bank Directory Governance
  - name: FDL Bank Directory Bulk
  - name: FDL Transaction Reference Config
  - name: FDL Transaction Reference Governance
  - name: FDL Transaction Reference Runtime
  - name: FDL Currency Master
  - name: FDL Currency Master Governance
  - name: FDL Currency Master Bulk
  - name: FDL Country Master
  - name: FDL Country Master Governance
  - name: FDL Country Master Bulk
  - name: FDL State Master
  - name: FDL State Master Governance
  - name: FDL State Master Bulk
  - name: FDL City Master
  - name: FDL City Master Governance
  - name: FDL City Master Bulk
paths:
  /api/v1/fdl/bank-directory:
    get:
      tags: [FDL Bank Directory]
      summary: List bank directory records with search and filters
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: swiftCode
          schema: { type: string }
        - in: query
          name: bankName
          schema: { type: string }
        - in: query
          name: countryCode
          schema: { type: string, minLength: 2, maxLength: 2 }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: operationalStatus
          schema: { type: string, enum: [ENABLED, DISABLED, SUSPENDED] }
        - in: query
          name: status
          schema: { type: string, enum: [PENDING, APPROVED, REJECTED, ALL] }
        - in: query
          name: page
          schema: { type: integer, default: 0, minimum: 0 }
        - in: query
          name: size
          schema: { type: integer, default: 20, minimum: 1 }
      responses:
        "200":
          description: Paginated records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageBankDirectoryRecord"
    post:
      tags: [FDL Bank Directory]
      summary: Create bank record (Maker)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankDirectoryCreateRequest"
      responses:
        "201":
          description: Submitted for approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankDirectoryRecord"
        "400":
          description: Validation error
        "409":
          description: Duplicate swift_code + branch_code

  /api/v1/fdl/bank-directory/{id}:
    get:
      tags: [FDL Bank Directory]
      summary: Get bank record by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankDirectoryRecord"
        "404":
          description: Not found
    put:
      tags: [FDL Bank Directory]
      summary: Edit approved bank record (Maker submit for approval)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankDirectoryUpdateRequest"
      responses:
        "200":
          description: Submitted for approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankDirectoryRecord"
        "400":
          description: Validation error
        "404":
          description: Not found
        "409":
          description: Record is not in editable approved state or duplicate key
    delete:
      tags: [FDL Bank Directory]
      summary: Submit delete request (Maker)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Delete request submitted for approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "404":
          description: Not found

  /api/v1/fdl/bank-directory/pending:
    get:
      tags: [FDL Bank Directory Governance]
      summary: List pending records for checker queue
      parameters:
        - in: query
          name: action
          schema: { type: string, enum: [NEW, MODIFY, DELETE] }
        - in: query
          name: page
          schema: { type: integer, default: 0, minimum: 0 }
        - in: query
          name: size
          schema: { type: integer, default: 20, minimum: 1 }
      responses:
        "200":
          description: Pending queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageBankDirectoryRecord"

  /api/v1/fdl/bank-directory/{id}/approve:
    post:
      tags: [FDL Bank Directory Governance]
      summary: Approve pending bank record action (Checker)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "403":
          description: Forbidden (role or maker-checker violation)
        "409":
          description: Invalid pending transition

  /api/v1/fdl/bank-directory/{id}/reject:
    post:
      tags: [FDL Bank Directory Governance]
      summary: Reject pending bank record action (Checker)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectRequest"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "400":
          description: Missing reason
        "403":
          description: Forbidden (role or maker-checker violation)
        "409":
          description: Invalid pending transition

  /api/v1/fdl/bank-directory/bulk-upload:
    post:
      tags: [FDL Bank Directory Bulk]
      summary: Bulk upload bank records (CSV/XLSX)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Bulk ingestion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkUploadResult"
        "400":
          description: Invalid file format or payload

  /api/v1/fdl/bank-directory/template:
    get:
      tags: [FDL Bank Directory Bulk]
      summary: Download template (CSV or XLSX)
      parameters:
        - in: query
          name: format
          required: true
          schema: { type: string, enum: [csv, xlsx] }
      responses:
        "200":
          description: Template file stream
          content:
            text/csv: {}
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet: {}

  /api/v1/fdl/bank-directory/export:
    get:
      tags: [FDL Bank Directory Bulk]
      summary: Export filtered records as CSV
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: swiftCode
          schema: { type: string }
        - in: query
          name: bankName
          schema: { type: string }
        - in: query
          name: countryCode
          schema: { type: string, minLength: 2, maxLength: 2 }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: operationalStatus
          schema: { type: string, enum: [ENABLED, DISABLED, SUSPENDED] }
        - in: query
          name: status
          schema: { type: string, enum: [PENDING, APPROVED, REJECTED, ALL] }
      responses:
        "200":
          description: CSV export stream
          content:
            text/csv: {}

  /api/v1/fdl/currency-master:
    get:
      tags: [FDL Currency Master]
      summary: List currency master records with search and filters
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: entityName
          schema: { type: string }
