          name: currencyName
          schema: { type: string }
        - in: query
          name: alphabeticCode
          schema: { type: string, minLength: 3, maxLength: 3 }
        - in: query
          name: numericCode
          schema: { type: string, pattern: "^[0-9]{3}$" }
        - in: query
          name: countryCode
          schema: { type: string, minLength: 2, maxLength: 2 }
        - in: query
          name: operationalStatus
          schema: { type: string, enum: [ENABLED, DISABLED, SUSPENDED] }
        - in: query
          name: status
          schema: { type: string, enum: [PENDING, APPROVED, REJECTED, ALL] }
        - in: query
