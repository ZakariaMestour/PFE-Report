<!doctype html>
<html>
<head><meta charset="utf-8"><title>Supply Chain Finance Ecosystem</title></head>
<body>
<div class="html-diagram-engine-ch1_scf_ecosystem" style="padding:24px;background:white;display:inline-block;">
  <style>
    .html-diagram-engine-ch1_scf_ecosystem .diagram-grid {
      display:grid;
      grid-template-columns:repeat(5, 180px);
      gap:18px;
      align-items:center;
      justify-items:center;
      font-family:system-ui,-apple-system,Segoe UI,sans-serif;
    }
    .html-diagram-engine-ch1_scf_ecosystem .node {
      box-sizing:border-box;
      overflow:hidden;
      word-wrap:break-word;
      background:#ffffff;
      border:2px solid #b7c6d6;
      color:#183044;
      padding:14px 16px;
      border-radius:8px;
      text-align:center;
      font-weight:650;
      width:180px;
      min-height:76px;
      box-shadow:0 6px 14px rgba(24,48,68,.08);
    }
    .html-diagram-engine-ch1_scf_ecosystem .accent { background:#edf7f1;border-color:#73a884; }
    .html-diagram-engine-ch1_scf_ecosystem .bank { background:#eef3fb;border-color:#6f93c6; }
    .html-diagram-engine-ch1_scf_ecosystem svg { width:100%; height:60px; }
  </style>
  <div class="diagram-grid">

    <div class="node accent">Anchor<br>Commercial reference</div>
    <svg><line x1="5" y1="30" x2="175" y2="30" stroke="#4b6478" stroke-width="4" marker-end="url(#arrow)"/></svg>
    <div class="node bank">SCF Program<br>Rules and fees</div>
    <svg><line x1="5" y1="30" x2="175" y2="30" stroke="#4b6478" stroke-width="4"/></svg>
    <div class="node accent">Counterparty<br>Supplier or distributor</div>
    
  </div>
</div>
</body>
</html>
