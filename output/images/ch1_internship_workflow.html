<!doctype html>
<html>
<head><meta charset="utf-8"><title>Internship Workflow</title></head>
<body>
<div class="html-diagram-engine-ch1_internship_workflow" style="padding:24px;background:white;display:inline-block;">
  <style>
    .html-diagram-engine-ch1_internship_workflow .diagram-grid {
      display:grid;
      grid-template-columns:repeat(5, 180px);
      gap:18px;
      align-items:center;
      justify-items:center;
      font-family:system-ui,-apple-system,Segoe UI,sans-serif;
    }
    .html-diagram-engine-ch1_internship_workflow .node {
      box-sizing:border-box;
      overflow:hidden;
      word-wrap:break-word;
      background:#ffffff;
      border:2px solid #b7c6d6;
      color:#183044;
      padding:14px 16px;
      border-radius:8px;
      text-align:center;
      font-weight:650;
      width:180px;
      min-height:76px;
      box-shadow:0 6px 14px rgba(24,48,68,.08);
    }
    .html-diagram-engine-ch1_internship_workflow .accent { background:#edf7f1;border-color:#73a884; }
    .html-diagram-engine-ch1_internship_workflow .bank { background:#eef3fb;border-color:#6f93c6; }
    .html-diagram-engine-ch1_internship_workflow svg { width:100%; height:60px; }
  </style>
  <div class="diagram-grid">

    <div class="node">Jira Ticket</div>
    <svg></svg>
    <div class="node accent">Development</div>
    <svg></svg>
    <div class="node">Bitbucket PR</div>
    
  </div>
</div>
</body>
</html>
